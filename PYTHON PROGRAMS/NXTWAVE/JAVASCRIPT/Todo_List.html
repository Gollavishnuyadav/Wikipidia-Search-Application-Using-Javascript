<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Request</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .header {
            font-weight: bold;
        }
        .details {
            font-weight: bold;
            margin-top: 10px;
        }
        .additional-info {
            margin-top: 10px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">Hello!</div>
        <p>DCT App support has been requested by <b>__USERNAME__</b> (<b>__USEREMAIL__</b>) for the DCT App.</p>
        <p class="details">Additional details:</p>
        <div class="additional-info">
            <p>Received On: <span id="receivedOn"></span></p>
            <p>Comments: __MESSAGE__</p>
        </div>
        <br>
        <p>Thank you!</p>
    </div>

    <script>
        window.onload = function() {
            const now = new Date();
            const receivedDate = now.toLocaleDateString(); // Get the date part only
            document.getElementById('receivedOn').textContent = receivedDate;
        }
    </script>
</body>
</html>
