<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
</head>
<style>
    .lorry {
        position: relative;
        left: 0;
        transition: left 3s linear;
      }
      
      .lorry-body {
        width: 200px;
        height: 100px;
        background-color: #333;
        position: relative;
      }
      
      .item {
        width: 30px;
        height: 30px;
        background-color: #F9A825;
        position: absolute;
        bottom: 10px;
        left: 10px;
        margin-right: 10px;
      }
      
      .lorry-wheel {
        width: 40px;
        height: 40px;
        background-color: #000;
        position: absolute;
        bottom: 0;
      }
      
      .lorry-wheel:first-child {
        left: 20px;
      }
      
      .lorry-wheel:last-child {
        right: 20px;
      }
      
      .move {
        left: 300px;
      }
      
      
</style>
<body>
    <div class="lorry">
        <marquee><img src="https://static.vecteezy.com/system/resources/previews/010/872/418/original/3d-delivery-truck-icon-png.png" alt=""></marquee>
        <div class="lorry-body">
          <div class="item"></div>
          <div class="item"></div>
          <div class="item"></div>
        </div>
        <div class="lorry-wheel"></div>
        <div class="lorry-wheel"></div>
      </div>
      
      
</body>
<script>
    setTimeout(function() {
        var lorryElement = document.querySelector('.lorry');
        lorryElement.classList.add('move');
      }, 1000);
      
</script>
</html>
