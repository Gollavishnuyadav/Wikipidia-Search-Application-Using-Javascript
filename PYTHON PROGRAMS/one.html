<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       
button{
  background-color: #EA4C89;
  border-radius: 8px;
  border-style: none;
  box-sizing: border-box;
  color: #FFFFFF;
  cursor: pointer;
  display: inline-block;
  font-family: "Haas Grot Text R Web", "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-size: 14px;
  font-weight: 500;
  height: 40px;
  line-height: 20px;
  list-style: none;
  margin: 0;
  outline: none;
  padding: 10px 16px;
  position: relative;
  text-align: center;
  text-decoration: none;
  transition: color 100ms;
  vertical-align: baseline;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}

button:hover,
button:focus {
  background-color: #F082AC;
}
    </style>
</head>

<body align="center">
    <h1>COUNTER</h1>
<h1 id="text">0</h1>
<button onclick="inc()">Increment</button>
<button onclick="reset()">Reset</button>
<button onclick="dec()">Decrement</button>


</body>
<script>
    let d=document.getElementById("text")//0
    function inc()
    {
        let val=d.textContent
        let inV=parseInt(val)+1;
        d.textContent=inV;
        if(inV>0)
        {
            d.style.color="green";
        }
        else if(inV<0)
        {
            d.style.color="red";
        }
        else
        {
            d.style.color="black";
        }
    }
    function dec()
    {
        let val=d.textContent//0
        let inV=parseInt(val)-1;
        d.textContent=inV;
        if(inV>0)
        {
            d.style.color="green";
        }
        else if(inV<0)
        {
            d.style.color="red";
        }
        else
        {
            d.style.color="black";
        }
    }
    function reset()
    {
        d.textContent=0;
      
            d.style.color="black";
        
       
    }
</script>
</html>
